<!DOCTYPE html>
<html th:fragment="layout(content)" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Campus Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/catalog}">Campus Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-1">

                <th:block th:if="${session.userId == null}">
                    <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/register}">Register</a></li>
                </th:block>

                <th:block th:if="${session.userId != null}">
                    <li class="nav-item">
                        <span class="nav-link text-light" th:text="${session.userName}">User</span>
                    </li>
                    <li class="nav-item d-flex align-items-center">
                        <span class="badge bg-warning text-dark" th:text="${session.userRole}">ROLE</span>
                    </li>

                    <th:block th:if="${session.userRole == 'ADMIN'}">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                        </li>
                    </th:block>

                    <th:block th:if="${session.userRole == 'CUSTOMER'}">
                        <li class="nav-item"><a class="nav-link" th:href="@{/catalog}">Browse</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/orders/new}">New Order</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/orders/history}">My Orders</a></li>
                    </th:block>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}">Logout</a>
                    </li>
                </th:block>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:replace="${content}">Page content placeholder</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
