<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <a th:href="@{/catalog}" class="btn btn-link ps-0 mb-3">&larr; Back to Catalog</a>

    <div class="row">
        <div class="col-md-7">
            <h2 class="mb-1" th:text="${product.name}">Product Name</h2>
            <p class="text-muted mb-3" th:text="${product.category.name}">Category</p>

            <p class="lead" th:text="${product.description}">Description</p>

            <table class="table table-borderless w-auto mt-3">
                <tr>
                    <th class="pe-4">Price</th>
                    <td class="fw-bold" th:text="'$' + ${product.price}">$0.00</td>
                </tr>
                <tr>
                    <th>Stock</th>
                    <td>
                        <span th:if="${product.stockQty == 0}" class="badge bg-secondary">Out of Stock</span>
                        <span th:if="${product.stockQty > 0}" class="text-success fw-semibold"
                              th:text="${product.stockQty} + ' units available'">In Stock</span>
                    </td>
                </tr>
            </table>

            <div class="mt-4 d-flex gap-2">
                <a th:href="@{/orders/new}" class="btn btn-primary">Build an Order</a>
                <a th:href="@{/catalog}" class="btn btn-outline-secondary">Back to Catalog</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
