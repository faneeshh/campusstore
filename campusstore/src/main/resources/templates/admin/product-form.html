<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4" th:text="${product != null ? 'Edit Product' : 'New Product'}">Product Form</h2>

            <form method="post"
                  th:with="actionUrl=${product != null ? '/admin/products/' + product.id + '/edit' : '/admin/products'}"
                  th:action="${actionUrl}">

                <div class="mb-3">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" class="form-control" id="name" name="name"
                           th:value="${product?.name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="description">Description</label>
                    <textarea class="form-control" id="description" name="description"
                              rows="3" th:text="${product?.description}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="price">Price ($)</label>
                    <input type="number" class="form-control" id="price" name="price"
                           step="0.01" min="0" th:value="${product?.price}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="stockQty">Stock Quantity</label>
                    <input type="number" class="form-control" id="stockQty" name="stockQty"
                           min="0" th:value="${product?.stockQty}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="categoryId">Category</label>
                    <select class="form-select" id="categoryId" name="categoryId" required>
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product != null and product.category.id == cat.id}">
                            Category
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Product</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
