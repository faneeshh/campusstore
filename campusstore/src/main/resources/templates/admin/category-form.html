<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4">New Category</h2>
            <form th:action="@{/admin/categories}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="name">Category Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Create Category</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
