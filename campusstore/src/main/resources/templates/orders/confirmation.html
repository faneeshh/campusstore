<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main})}" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <div class="text-center mb-4">
        <h2 class="text-success">&#10003; Order Confirmed!</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <p class="mb-1"><strong>Order ID:</strong> <span th:text="${order.id}">0</span></p>
            <p class="mb-1">
                <strong>Status:</strong>
                <span class="badge bg-primary" th:text="${order.status}">NEW</span>
            </p>
            <p class="mb-1">
                <strong>Date:</strong>
                <span th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
            </p>
            <p class="mb-0">
                <strong>Total:</strong>
                <span class="fw-bold" th:text="'$' + ${order.total}">$0.00</span>
            </p>
        </div>
    </div>

    <h5>Order Items</h5>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-light">
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.product.name}">Product</td>
                <td th:text="${item.qty}">1</td>
                <td th:text="'$' + ${item.unitPrice}">$0.00</td>
                <td th:text="'$' + ${item.unitPrice.multiply(new java.math.BigDecimal(item.qty))}">$0.00</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/orders/history}" class="btn btn-outline-primary">My Orders</a>
        <a th:href="@{/catalog}" class="btn btn-outline-secondary">Continue Shopping</a>
    </div>
</main>
</body>
</html>
