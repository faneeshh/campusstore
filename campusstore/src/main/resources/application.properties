spring.application.name=campusstore

# Database
spring.datasource.url=jdbc:mariadb://localhost:3306/campusstore
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Session
server.servlet.session.timeout=30m

# Trust X-Forwarded-* headers from the Codespace / reverse-proxy layer
# so redirects use the correct external hostname and port (no :8080)
server.forward-headers-strategy=native